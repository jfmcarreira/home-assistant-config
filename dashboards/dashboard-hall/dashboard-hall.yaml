kiosk_mode:
  hide_header: true
button_card_templates: !include ../common/button-card-templates.yaml
decluttering_templates: !include ../common/declutering.yaml
views:

  - theme: Backend-selected
    title: Dashboard Hall
    path: main
    icon: mdi:home-roof
    type: custom:horizontal-layout
    layout:
      max_cols: 2
      column_widths: 45% 55%
      max_width: 100%
      margin: 0
      reflow: true
    badges: []
    cards:
      - type: vertical-stack
        view_layout:
          column: 1
        cards: !include control-panel.yaml
      - type: custom:state-switch
        entity: hash
        default: panel-main
        view_layout:
          column: 2
        states:
          panel-main:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              reflow: true
              max_cols: 1
              column_widths: 100%
              max_width: 100%
              margin: 0
              height: 572px
            cards: !include panel-main.yaml
          panel-roborock:
