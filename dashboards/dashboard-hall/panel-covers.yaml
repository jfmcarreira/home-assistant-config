- type: custom:decluttering-card
  template: decluttering_cover
  variables:
    - room_name: Suite
    - room_icon: mdi:bed-double
    - room_code_name: master_bedroom
    - details_title: Estore da Suite
- type: custom:decluttering-card
  template: decluttering_cover
  variables:
    - room_name: Quarto do Ricardo
    - room_icon: mdi:human-child
    - room_code_name: bedroom_ricardo
    - details_title: Estore do Quarto do Ricardo
- type: custom:decluttering-card
  template: decluttering_cover
  variables:
    - room_name: Quarto do Henrique
    - room_icon: mdi:baby
    - room_code_name: bedroom_henrique
    - details_title: Estore do Quarto do Henrique
- features:
    - type: cover-open-close
  type: tile
  icon_tap_action:
    action: more-info
  name: Escadas
  entity: cover.stairs
  icon: mdi:stairs
  features_position: bottom
  vertical: false
  tap_action:
    action: fire-dom-event
    browser_mod:
      service: browser_mod.popup
      data:
        auto_close: false
        large: false
        allow_nested_more_info: false
        content:
          type: vertical-stack
          title: Estore das Escadas
          cards:
            - type: custom:layout-card
              layout_type: custom:horizontal-layout
              layout:
                max_cols: 2
              cards:
                - features:
                    - type: cover-open-close
                    - type: cover-position
                  type: tile
                  icon_tap_action:
                    action: more-info
                  name: Escadas
                  entity: cover.stairs
                  icon: mdi:stairs
                  features_position: bottom
                  vertical: false
                  view_layout:
                    column: 1
                - type: entities
                  entities:
                    - entity: sensor.device_battery_cover_stairs
                      name: Bateria
                      secondary_info: last-updated
                - type: custom:auto-entities
                  card:
                    type: entities
                  filter:
                    include:
                      - entity_id: input_boolean.cover_control_*_stairs
                      - entity_id: input_number.*_position_stairs
                  view_layout:
                    column: 2
