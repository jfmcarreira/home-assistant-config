- type: custom:mod-card
  style:
    hui-horizontal-stack-card$: |
      :host {
        height: auto;
      }
  card:
    type: horizontal-stack
    cards:
      - show_name: true
        show_icon: true
        type: button
        icon_height: 42px
        name: Abrir Todos
        icon: mdi:window-shutter-open
        tap_action:
          action: call-service
          service: cover.open_cover
          data:
            entity_id: cover.all_house
      - type: button
        icon_height: 42px
        name: Fechar Todos
        icon: mdi:window-shutter
        tap_action:
          action: call-service
          service: cover.close_cover
          data:
            entity_id: cover.all_house
