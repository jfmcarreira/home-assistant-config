- type: entities
  entities:
    - input_select.house_mode
- type: custom:state-switch
  default: remaining
  entity: template
  template: |-
    {% if now().time().hour >= 5 and now().time().hour < 21 %}
      daytime
    {% elif now().time().hour >= 0 and now().time().hour < 5 %}
      sleeptime
    {% else %}
      nighttime
    {% endif %}
  states:
    nighttime:
      square: false
      columns: 2
      type: grid
      cards:
        - show_name: true
          show_icon: true
          type: button
          tap_action:
            action: call-service
            service: input_select.select_option
            data:
              option: Evening
              entity_id: input_select.house_mode
          entity: input_select.house_mode
          icon: mdi:weather-sunset
          name: Ativar Modo Anoitecer
          icon_height: 100px
        - show_name: true
          show_icon: true
          type: button
          tap_action:
            action: call-service
            service: input_select.select_option
            data:
              option: Night
              entity_id: input_select.house_mode
          entity: input_select.house_mode
          icon: mdi:weather-night
          name: Ativar Modo Noite
          icon_height: 100px
    sleeptime:
      square: false
      columns: 2
      type: grid
      cards:
        - show_name: true
          show_icon: true
          type: button
          tap_action:
            action: call-service
            service: input_select.select_option
            data:
              option: Night
              entity_id: input_select.house_mode
          entity: input_select.house_mode
          icon: mdi:weather-night
          name: Ativar Modo Noite
          icon_height: 100px
        - show_name: true
          show_icon: true
          type: button
          tap_action:
            action: call-service
            service: input_select.select_option
            data:
              option: Sleep
              entity_id: input_select.house_mode
          entity: input_select.house_mode
          icon: mdi:sleep
          name: Ativar Modo Dormir
          icon_height: 100px
    daytime:
      square: false
      columns: 2
      type: grid
      cards:
        - show_name: true
          show_icon: true
          type: button
          tap_action:
            action: call-service
            service: input_select.select_option
            data:
              option: Evening
              entity_id: input_select.house_mode
          entity: input_select.house_mode
          icon: mdi:weather-sunset
          name: Ativar Modo Amanhecer
          icon_height: 100px
        - show_name: true
          show_icon: true
          type: button
          tap_action:
            action: call-service
            service: input_select.select_option
            data:
              option: "On"
              entity_id: input_select.house_mode
          entity: input_select.house_mode
          icon: mdi:weather-sunny
          name: Ativar Modo Dia
          icon_height: 100px

- type: custom:mod-card
  style:
    hui-horizontal-stack-card$: |
      :host {
        height: auto;
      }
  card:
    type: horizontal-stack
    cards:
      - type: tile
        entity: binary_sensor.house_guest
        vertical: true
        hide_state: false
        features_position: bottom
        icon_tap_action:
          action: perform-action
          perform_action: input_boolean.toggle
          target:
            entity_id: input_boolean.house_guest
      - type: tile
        entity: input_boolean.notification_active_non_disturb
        vertical: true
        hide_state: true

