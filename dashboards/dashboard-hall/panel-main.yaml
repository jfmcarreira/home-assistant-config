- type: custom:auto-entities
  card:
    type: vertical-stack
  card_param: cards
  filter:
    exclude:
      - entity_id: script.routine_dinner_time
      - entity_id: script.routine_cover_rain_mode
    include:
      - entity_id: script.routine*
        state: "on"
        options:
          type: tile
          features_position: bottom
          vertical: false
          tap_action:
            action: toggle
          icon_tap_action:
            action: more-info
          hide_state: true
  show_empty: false

- type: conditional
  conditions:
    - condition: state
      entity: alarm_control_panel.alarmo
      state_not: disarmed
  card:
    states:
      - arm_home
      - arm_away
    type: alarm-panel
    entity: alarm_control_panel.alarmo

- type: custom:auto-entities
  card:
    type: vertical-stack
  card_param: cards
  filter:
    exclude:
      - entity_id: climate.office
      - entity_id: climate.*_vtherm
      - entity_id: climate.living_room
      - state: "off"
      - state: unavailable
    include:
      - options:
          features:
            - type: target-temperature
          type: tile
          features_position: inline
          state_content:
            - current_temperature
            - fan_mode
            - swing_mode
            - preset_mode
          vertical: false
          icon_tap_action:
            action: toggle
        entity_id: climate.*
  show_empty: false

- type: entity-filter
  entities:
    - entity: fan.main_bathroom
      name: Principal
    - entity: fan.bathroom_master_bedroom
      name: Suite
    - entity: fan.bathroom_rc
      name: Serviço
  state_filter:
    - "on"
  card:
    type: entities
    title: Ventoinhas da Casa do Banho
    show_header_toggle: true
  show_empty: false

- type: conditional
  conditions:
    - entity: binary_sensor.roborock_state
      state: "on"
  card:
    type: tile
    entity: vacuum.roborock
    features:
      - type: vacuum-commands
        commands:
          - start_pause
          - stop
          - clean_spot

- type: conditional
  conditions:
    - entity: humidifier.portable_dehumidifier
      state_not: "off"

  card:
    type: tile
    entity: humidifier.portable_dehumidifier
    features:
        - type: target-humidity
    features_position: inline
- type: conditional
  conditions:
    - entity: climate.portable_heater
      state_not: "off"
  card:
    type: tile
    entity: climate.portable_heater

- type: conditional
  conditions:
