- type: conditional
  conditions:
    - entity: sensor.salicru_rack_ups_status
      state: On Battery
  card:
    type: gauge
    entity: sensor.salicru_rack_ups_battery_charge
    name: Bateria da UPS
    unit: "%"
    min: 0
    max: 100
    needle: false
    severity:
      green: 60
      yellow: 20
      red: 2

- type: conditional
  conditions:
    - condition: state
      entity: sensor.weather_alert
      state_not: green
    - condition: state
      entity: sensor.weather_alert
      state_not: yellow
  card:
    type: custom:mushroom-entity-card
    entity: sensor.weather_alert
    name: Alerta Metereológico
    primary_info: state
    secondary_info: name
    icon_type: none
    fill_container: false
    layout: vertical
    card_mod:
      style: |
        ha-card {
          --card-primary-font-size: 28px;
          --card-secondary-font-size: 14px;
        }
- type: conditional
  conditions:
    - entity: input_boolean.extended_away_mode
      state: "on"
  card:
    type: tile
    entity: input_boolean.extended_away_mode
    name: Modo de Férias
    tap_action:
      action: call-service
      service: input_boolean.turn_off
      data: {}
      target:
        entity_id: input_boolean.extended_away_mode
    icon_tap_action:
      action: none

- type: conditional
  conditions:
    - entity: input_boolean.automation_sw_all_motion_lights
      state: "off"
  card:
    type: tile
    entity: input_boolean.automation_sw_all_motion_lights
    tap_action:
      action: call-service
      service: input_boolean.turn_on
      data: {}
      target:
        entity_id: input_boolean.automation_sw_all_motion_lights
    icon_tap_action:
      action: none

- type: conditional
  conditions:
    - entity: input_boolean.cover_controls_bypass
      state: "on"
  card:
    type: tile
    entity: input_boolean.cover_controls_bypass
    tap_action:
      action: call-service
      service: input_boolean.turn_off
      data: {}
      target:
        entity_id:
          - input_boolean.cover_controls_bypass
    name: Controlo dos Estores OFF
    icon_tap_action:
      action: none

- type: conditional
  conditions:
    - condition: state
      entity: cover.gate
      state_not: closed
    - condition: state
      entity: cover.gate
      state_not: unavailable
  card:
    type: tile
    entity: cover.gate
    vertical: true
    show_entity_picture: false
    hide_state: false
    state_content:
      - state
      - last-changed
    tap_action:
      action: perform-action
      perform_action: cover.close_cover
      target:
        entity_id: cover.gate
    icon_tap_action:
      action: perform-action
      perform_action: cover.close_cover
      target:
        entity_id: cover.gate

- type: conditional
  conditions:
    - condition: state
      entity: light.hall_presence
      state: "on"
  card:
    type: custom:mushroom-light-card
    show_brightness_control: true
    layout: horizontal
    primary_info: name
    secondary_info: none
    entity: light.hall_presence
    name: Presença Sótão
- type: conditional
  conditions:
    - condition: state
      entity: light.hallway_presence
      state: "on"
  card:
    type: custom:mushroom-light-card
    show_brightness_control: true
    layout: horizontal
    primary_info: name
    secondary_info: none
    name: Presença Corredor
    entity: light.hallway_presence
- type: conditional
  conditions:
    - condition: state
      entity: light.stairs_down
      state: "on"
  card:
    type: custom:mushroom-light-card
    show_brightness_control: true
    layout: horizontal
    primary_info: name
    secondary_info: none
    entity: light.stairs_down
    name: Hall das Escadas
- type: conditional
  conditions:
    - condition: state
      entity: light.master_bedroom_lamp
      state: "on"
  card:
    type: custom:mushroom-light-card
    show_brightness_control: true
    layout: horizontal
    primary_info: name
    secondary_info: none
    entity: light.master_bedroom_lamp
    name: Candeeiro da Suite
- type: conditional
  conditions:
    - condition: state
      entity: light.bedroom_ricardo_lamp
      state: "on"
  card:
    type: custom:mushroom-light-card
    show_brightness_control: true
    layout: horizontal
    primary_info: name
    secondary_info: none
    entity: light.bedroom_ricardo_lamp
    name: Candeeiro do Ricardo

