      - options: {}
        entity_id: light.kitchen_*
      - options: {}
        entity_id: light.hallway_group
      - options: {}
        entity_id: light.stairs_down
      - entity_id: light.living_room_hallway_group
      - options: {}
        entity_id: light.*presence
      - options: {}
        entity_id: light.laundry_*
      - options: {}
        entity_id: light.office_*
      - options: {}
        entity_id: light.bedroom_rc_*
      - options: {}
        entity_id: light.hall
      - options: {}
        entity_id: light.xmas*
      - options: {}
        entity_id: light.hall_side
      - options: {}
        entity_id: light.living_room_window
      - options: {}
        entity_id: light.kitchen_led
      - options: {}
        entity_id: light.kitchen_window
      - options: {}
        entity_id: light.living_room
      - options: {}
        entity_id: light.living_room_window
      - options: {}
        entity_id: light.living_room_table
      - options: {}
