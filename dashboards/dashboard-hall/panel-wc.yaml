- type: custom:mushroom-title-card
  title: Casa de Banho Principal
  alignment: center
- type: custom:mod-card
  style:
    hui-horizontal-stack-card$: |
      :host {
        height: auto;
      }
  card:
    type: horizontal-stack
    cards:
      - type: custom:mushroom-light-card
        entity: light.main_bathroom_ceiling
        name: Luz do Teto
        fill_container: true
        use_light_color: false
      - type: custom:mushroom-light-card
        entity: light.main_bathroom_led
        name: Retro-Iluminação
- type: custom:mod-card
  style:
    hui-horizontal-stack-card$: |
      :host {
        height: auto;
      }
  card:
    type: horizontal-stack
    cards:
      - type: custom:mushroom-fan-card
        entity: fan.main_bathroom
        name: Ventoinha
      - type: custom:mushroom-entity-card
        entity: switch.auto_fan_main_bathroom
        name: Controlo
        primary_info: name
- type: custom:mod-card
  style:
    hui-horizontal-stack-card$: |
      :host {
        height: auto;
      }
  card:
    type: horizontal-stack
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.humidity_main_bathroom
        name: Humidade
        primary_info: state
        secondary_info: last-updated
      - type: custom:mushroom-entity-card
        entity: sensor.temperature_main_bathroom
        name: Temperatura
        primary_info: state
        secondary_info: last-updated
      - type: custom:mushroom-entity-card
        entity: sensor.mold_main_bathroom
        secondary_info: name
        primary_info: state
        icon: mdi:cloud-percent
        name: Indicador de Bolor
- type: conditional
  conditions:
    - condition: state
      entity: input_select.portable_heater_location
      state: Casa de Banho Principal
  card:
    features:
      - type: humidifier-modes
    type: tile
    entity: climate.portable_heater
    state_content:
      - current_temperature
      - temperature
- type: conditional
  conditions:
    - condition: state
      entity: input_select.dehumidifier_location
      state: Casa de Banho Principal
  card:
    features:
      - type: humidifier-modes
    type: tile
    entity: humidifier.portable_dehumidifier
    state_content:
      - current_humidity
      - humidity

