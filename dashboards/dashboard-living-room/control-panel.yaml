- type: custom:button-card
  name: "[[[ return states['sensor.date_frontend'].state; ]]]"
  label: "[[[ return states['sensor.time'].state; ]]]"
  show_label: true
  tap_action:
    action: navigate
    navigation_path: "#panel-main"
  hold_action:
    action: javascript
    javascript: |
      [[[
        this.dispatchEvent(new Event('hass-toggle-menu', { bubbles: true, composed: true }));
      ]]]
  styles:
    card:
      - height: 140px
    name:
      - font-size: 50px
      - font-weight: 400
      - line-height: 0.8
      - margin: 18px
      - color: gray
    label:
      - font-size: 80px
      - line-height: 0.8
      - margin: 0
      - padding: 0

- show_current: true
  show_forecast: true
  type: weather-forecast
  entity: weather.home
  forecast_type: daily

- square: false
  columns: 2
  type: grid
  cards:
    - type: custom:button-card
      size: 58%
      styles:
        icon:
          - color: var(--state-icon-color)
      show_state: false
      icon: mdi:lightbulb-group
      tap_action:
        action: navigate
        navigation_path: "#panel-lights"
      hold_action:
        action: navigate
        navigation_path: /dashboard-configuration/config-lights
    - type: custom:button-card
      size: 58%
      styles:
        icon:
          - color: var(--state-icon-color)
      show_state: false
      icon: mdi:window-shutter
      tap_action:
        action: navigate
        navigation_path: "#panel-covers"
      hold_action:
        action: navigate
        navigation_path: /lovelace-subviews/dashboard-covers

- square: false
  columns: 3
  type: grid
  cards:
    - type: custom:button-card
      size: 65%
      show_name: false
      icon: mdi:radiator
      entity: switch.air_conditioner
      state:
        - value: "off"
          styles:
            icon:
              - color: var(--state-icon-color)
      tap_action:
        action: navigate
        navigation_path: "#panel-ac"
      hold_action:
        action: call-service
        service: switch.turn_off
        target:
          entity_id: switch.air_conditioner
    - type: custom:button-card
      size: 65%
      entity: vacuum.roborock
      show_name: false
      color_type: icon
      tap_action:
        action: navigate
        navigation_path: "#panel-roborock"
      hold_action:
        action: navigate
        navigation_path: /lovelace-subviews/dashboard-roborock
      icon: mdi:robot-vacuum
      state:
        - value: docked
          styles:
            icon:
              - color: var(--state-icon-color)
    - type: custom:button-card
      size: 65%
      color_type: icon
      show_state: false
      icon: mdi:grass
      tap_action:
        action: navigate
        navigation_path: "#panel-exterior"
      hold_action:
        action: navigate
        navigation_path: /lovelace-subviews/dashboard-exterior
      custom_fields:
        lights_on: |
          [[[
            if (states['light.outside_group'].state == "on")
              return `<ha-icon icon="mdi:lightbulb-group"      style="width: 18px; height: 18px;"> </ha-icon>`
          ]]]
        gate_open: |
          [[[
            if (states['cover.gate'].state != "closed")
              return `<ha-icon icon="mdi:gate-open"      style="width: 18px; height: 18px;"> </ha-icon>`
          ]]]
      styles:
        icon:
          - color: var(--state-icon-color)
        custom_fields:
          gate_open:
            - color: var(--state-icon-color)
            - position: absolute
            - left: 10%
            - top: 0%
          lights_on:
            - color: var(--state-icon-color)
            - position: absolute
            - right: 10%
            - top: 0%
        grid:
          - position: relative
    - type: custom:button-card
      size: 65%
      color_type: icon
      show_state: false
      show_name: false
      entity: climate.water_heater
      icon: mdi:water-boiler
      triggers_update:
        - sensor.temperature_water_heater_top
        - sensor.temperature_water_heater_bottom
        - sensor.device_power_water_heater
        - switch.water_heater
        - climate.water_heater
      state:
        - operator: template
          value: |
            [[[ return states['switch.water_heater'].state === 'on' ]]]
          icon: mdi:water-boiler
          color: var(--state-active-color)
        - value: "off"
          icon: mdi:water-boiler-off
          styles:
            icon:
              - color: var(--state-icon-color)
        - operator: template
          value: |
            [[[ return states['climate.water_heater'].state === 'off' ]]]
          icon: mdi:water-boiler-off
        - operator: template
          value: |
            [[[ return states['climate.water_heater'].state === 'heat' ]]]
          icon: mdi:water-boiler
          color: var(--state-icon-color)
      custom_fields:
        readings: |
          [[[
            const top = parseFloat(states['sensor.temperature_water_heater_top']?.state);
            const bottom = parseFloat(states['sensor.temperature_water_heater_bottom']?.state);
            const target = parseFloat(states['climate.water_heater']?.attributes?.temperature);

            const fmt = (v) => !isNaN(v) ? `${Math.round(v)}°` : '—';

            return `
              <div class="reading">${fmt(top)}</div>
              <div class="reading">${fmt(bottom)}</div>
              <div class="reading">${fmt(target)}</div>
            `;
          ]]]
        heating: |
          [[[
            if (states['switch.water_heater'].state == "on")
              return `<ha-icon icon="mdi:thermometer-plus"      style="width: 18px; height: 18px;"> </ha-icon>`
          ]]]
      styles:
        icon: null
        custom_fields:
          heating:
            - color: var(--state-icon-color)
            - position: absolute
            - left: 8%
            - bottom: 10%
          readings:
            - color: var(--state-icon-color)
            - position: absolute
            - right: 5%
            - top: 20%
            - bottom: 20%
            - display: flex
            - flex-direction: column
            - justify-content: space-between
            - align-items: flex-end
            - font-size: 12px
        grid:
          - position: relative
      tap_action:
        action: navigate
        navigation_path: "#panel-water-heater"
      hold_action:
        action: navigate
        navigation_path: /lovelace-subviews/dashboard-water-heater
    - type: custom:button-card
      size: 65%
      state_display: "no"
      styles:
        icon:
          - color: var(--state-icon-color)
      icon: mdi:multimedia
      tap_action:
        action: navigate
        navigation_path: "#panel-media"
      hold_action:
        action: navigate
        navigation_path: /lovelace-subviews/multimedia
    - type: custom:button-card
      size: 65%
      state_display: "no"
      styles:
        icon:
          - color: var(--state-icon-color)
      icon: mdi:calendar-sync
      tap_action:
        action: navigate
        navigation_path: "#panel-routines"
      hold_action:
        action: navigate
        navigation_path: /lovelace-subviews/routines

- square: false
  columns: 4
  type: grid
  cards:
    - type: custom:button-card
      size: 60%
      state_display: "no"
      styles:
        icon:
          - color: var(--state-icon-color)
      icon: mdi:cctv
      tap_action:
        action: navigate
        navigation_path: "#panel-cctv"
      hold_action:
        action: navigate
        navigation_path: /lovelace-subviews/dashboard-cctv
    - type: custom:button-card
      size: 60%
      icon: mdi:shower-head
      styles:
        icon:
          - color: var(--state-icon-color)
      show_name: false
      show_state: false
      tap_action:
        action: navigate
        navigation_path: /lovelace-subviews/dashboard-wc
    - type: custom:button-card
      size: 60%
      show_state: false
      show_name: false
      color_type: icon
      entity: binary_sensor.tasks
      icon: mdi:calendar-outline
      custom_fields:
        wet_clothes: |
          [[[
            if (states['binary_sensor.wash_machine_wet_clothes'].state == "on")
              return `<ha-icon icon="mdi:hanger"      style="width: 18px; height: 18px;"> </ha-icon>`
          ]]]
        dry_clothes: |
          [[[
            if (states['binary_sensor.dryer_machine_need_emtpy'].state == "on")
              return `<ha-icon icon="mdi:tshirt-crew"      style="width: 18px; height: 18px;"> </ha-icon>`
          ]]]
        clean_dishes: |
          [[[
            if (states['binary_sensor.dish_wash_machine_clean'].state == "on")
              return `<ha-icon icon="mdi:silverware-clean"      style="width: 18px; height: 18px;"> </ha-icon>`
          ]]]
        cat_litter: |
          [[[
            if (states['binary_sensor.cat_litter_box_need_change'].state == "on")
              return `<ha-icon icon="mdi:cat"      style="width: 18px; height: 18px;"> </ha-icon>`
          ]]]
      styles:
        custom_fields:
          wet_clothes:
            - color: var(--state-icon-color)
            - position: absolute
            - left: 10%
            - top: 0%
          dry_clothes:
            - color: var(--state-icon-color)
            - position: absolute
            - left: 10%
            - bottom: 10%
          clean_dishes:
            - color: var(--state-icon-color)
            - position: absolute
            - right: 10%
            - top: 0%
          cat_litter:
            - color: var(--state-icon-color)
            - position: absolute
            - right: 10%
            - bottom: 10%
        grid:
          - position: relative
      tap_action:
        action: navigate
        navigation_path: /lovelace-subviews/dashboard-shores

    - type: custom:button-card
      size: 60%
      state_display: "no"
      styles:
        icon:
          - color: var(--state-icon-color)
      entity: sensor.house_mode
      show_name: false
      tap_action:
        action: navigate
        navigation_path: /lovelace-subviews/dashboard-house

