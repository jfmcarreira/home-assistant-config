kiosk_mode:
  hide_header: true
button_card_templates: !include ../common/button-card-templates.yaml
decluttering_templates: !include ../common/declutering.yaml
views:
  - theme: Backend-selected
    title: Dashboard Downstairs
    path: main
    icon: mdi:sofa
    type: custom:horizontal-layout
    layout:
      max_cols: 2
      column_widths: 30% 70%
      max_width: 300px
      reflow: true
      margin: 0 0 0 0
    badges: []
    cards:
      - type: vertical-stack
        layout_type: custom:horizontal-layout
        view_layout:
          column: 1
        cards: !include control-panel.yaml
      - type: custom:state-switch
        entity: hash
        default: panel-main
        view_layout:
          column: 2
        states:
          panel-ac:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_cols: 2
            cards: !include panel-ac.yaml
          panel-covers:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_cols: 2
            cards: !include panel-covers.yaml
          panel-lights:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_cols: 2
            cards: !include panel-lights.yaml

          panel-media:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_cols: 2
              column_widths: 40% 60%
              max_width: 2000px
            cards: !include panel-media.yaml

          panel-roborock:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_cols: 2
            cards: !include panel-roborock.yaml

          panel-water-heater:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_cols: 2
            cards: !include panel-water-heater.yaml

          panel-routines:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_width: 2000px
              column_widths: 100%
              max_cols: 1
            cards: !include panel-routines.yaml

          panel-exterior:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_width: 2000px
              column_widths: 100%
              max_cols: 1
            cards: !include panel-exterior.yaml

          panel-main:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              margin: 0 0 0 0
              reflow: true
              max_cols: 2
              #column_widths: 54% 46%
              #max_width: 200px
              height: 700px
            cards:
              - type: conditional
                conditions:
                  - condition: state
                    entity: sensor.weather_alert
                    state_not: green
                  - condition: state
                    entity: sensor.weather_alert
                    state_not: yellow
                card:
                  type: custom:button-card
                  name: "[[[ return helpers.localize(states['sensor.weather_alert']); ]]]"
                  label: Alerta Metereológico
                  show_label: true1
                  tap_action:
                    action: none
                  styles:
                    card:
                      - height: 80px
                      - display: flex
                      - flex-direction: column
                      - justify-content: center
                      - align-items: center
                    name:
                      - font-size: 40px
                      - font-weight: 500
                      - line-height: 1.2
                      - margin: "-13px"
                      - padding: 5px
                    label:
                      - font-size: 20px
                      - font-weight: 400
                      - color: gray
                      - margin: 8px
                      - padding: "-10px"
                      - line-height: 1.2
                  visibility:
                    - condition: state
                      entity: sensor.weather_alert
                      state_not: green
                    - condition: state
                      entity: sensor.weather_alert
                      state_not: yellow
                view_layout:
                  column: 1

              - type: conditional
                conditions:
                  - entity: sensor.salicru_rack_ups_status
                    state: On Battery
                card:
                  type: gauge
                  entity: sensor.salicru_rack_ups_battery_charge
                  name: Bateria da UPS
                  unit: "%"
                  min: 0
                  max: 100
                  needle: false
                  severity:
                    green: 60
                    yellow: 20
                    red: 2
                view_layout:
                  column: 1

              - type: conditional
                conditions:
                  - entity: input_boolean.house_guest
                    state: "on"
                card:
                  type: tile
                  entity: input_boolean.house_guest
                  name: Modo de Convidados
                  tap_action:
                    action: call-service
                    service: input_boolean.turn_off
                    data: {}
                    target:
                      entity_id: input_boolean.house_guest
                  icon_tap_action:
                    action: none
                view_layout:
                  column: 1

              - type: conditional
                conditions:
                  - entity: input_boolean.extended_away_mode
                    state: "on"
                card:
                  type: tile
                  entity: input_boolean.extended_away_mode
                  name: Modo de Férias
                  tap_action:
                    action: call-service
                    service: input_boolean.turn_off
                    data: {}
                    target:
                      entity_id: input_boolean.extended_away_mode
                  icon_tap_action:
                    action: none
                view_layout:
                  column: 1

              - type: custom:auto-entities
                card:
                  type: vertical-stack
                card_param: cards
                filter:
                  exclude:
                    - options: {}
                      entity_id: script.routine_dinner_time
                    - options: {}
                      entity_id: script.routine_cover_rain_mode
                  include:
                    - options:
                        type: tile
                        features_position: bottom
                        vertical: false
                        tap_action:
                          action: toggle
                        icon_tap_action:
                          action: more-info
                        hide_state: true
                      entity_id: script.routine*
                      state: "on"
                show_empty: false
                view_layout:
                  column: 1

              # - type: conditional
              #   view_layout:
              #     column: 1
              #   conditions:
              #     - condition: state
              #       entity: binary_sensor.tod_morning_before_work
              #       state: "on"
              #   card:
              #     square: false
              #     type: grid
              #     columns: 2
              #     cards:
              #       - type: custom:mushroom-entity-card
              #         entity: script.routine_exit_house_to_work_joao
              #         secondary_info: none
              #         layout: horizontal
              #         tap_action:
              #           action: call-service
