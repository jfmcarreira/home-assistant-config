              - type: conditional
                conditions:
                  - condition: state
                    entity: alarm_control_panel.alarmo
                    state_not: disarmed
                card:
                  states:
                    - arm_home
                    - arm_away
                  type: alarm-panel
                  entity: alarm_control_panel.alarmo
                view_layout:
                  column: 1

              - type: conditional
                view_layout:
                  column: 1
                conditions:
                  - condition: numeric_state
                    entity: sensor.temperature_water_heater_top
                    below: 50
                card:
                  type: tile
                  entity: climate.water_heater
                  vertical: false
                  icon_tap_action:
                    action: toggle
                  features:
                    - type: target-temperature
                    - style: icons
                      type: climate-preset-modes
                      preset_modes:
                        - none
                        - comfort
                        - eco
                  features_position: bottom

              # - type: conditional
              #   view_layout:
              #     column: 1
              #   conditions:
              #     - condition: state
              #       entity: climate.living_room
              #       state_not: unavailable
              #     - condition: or
              #       conditions:
              #         - condition: state
