kiosk_mode:
  hide_header: true
button_card_templates: !include button-card-templates.yaml
decluttering_templates: !include declutering.yaml
views:
  - theme: Backend-selected
    title: Dashboard Downstairs
    path: main
    icon: mdi:sofa
    type: custom:horizontal-layout
    layout:
      max_cols: 2
      column_widths: 30% 70%
      max_width: 300px
      reflow: true
      margin: 0 0 0 0
    badges: []
    cards:
      - type: vertical-stack
        layout_type: custom:horizontal-layout
        view_layout:
          column: 1
        cards: !include control-panel.yaml

      - type: custom:state-switch
        entity: hash
        default: panel-main
        view_layout:
          column: 2
        states:
          panel-main:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              margin: 0 0 0 0
              reflow: true
              max_cols: 2
              #column_widths: 54% 46%
              #max_width: 200px
              height: 700px
            cards: !include panel-main.yaml
          panel-ac:
            type: custom:layout-card
            layout_type: custom:masonry-layout
            layout:
              max_cols: 2
            cards: !include panel-ac.yaml

          panel-covers:
            type: custom:layout-card
            layout_type: custom:masonry-layout
            layout:
              max_cols: 2
            cards: !include panel-covers.yaml

          panel-lights:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_cols: 2
            cards: !include panel-lights.yaml

          panel-media:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_cols: 2
              column_widths: 40% 60%
              max_width: 2000px
            cards: !include panel-media.yaml

          panel-roborock:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_cols: 2
            cards: !include panel-roborock.yaml

          panel-routines:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_width: 2000px
              max_cols: 1
            cards: !include panel-routines.yaml
