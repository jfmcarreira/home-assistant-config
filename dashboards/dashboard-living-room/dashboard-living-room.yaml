              #         align_state: center
              #         line_color: "#326da8"
              #         hours_to_show: 24
              #         points_per_hour: 1
              #         tap_action:
              #           action: navigate
              #           navigation_path: /lovelace-subviews/dashboard-power
              #         hold_action:
              #           action: more-info
              #       - type: custom:mini-graph-card
              #         name: Bateria
              #         entities:
              #           - entity: sensor.deye_inverter_battery
              #         line_width: 6
