              - type: custom:power-flow-card-plus
                view_layout:
                  column: 1
                entities:
                  battery:
                    entity: sensor.deye_inverter_battery_power
                    state_of_charge: sensor.deye_inverter_battery
                    state_of_charge_unit_white_space: false
                  grid:
                    entity: sensor.house_power_grid
                  solar:
                    display_zero_state: true
                    entity: sensor.deye_inverter_pv_power
                  fossil_fuel_percentage:
                    entity: sensor.electricity_maps_concentracao_de_co2
                    color_value: true
                    use_metadata: false
                    state_type: percentage
                  home:
                    entity: sensor.house_power_consumption
                    use_metadata: false
                    override_state: false
                    subtract_individual: false
                    circle_animation: true
                  individual: []
                clickable_entities: true
                display_zero_lines:
                  mode: transparency
                  transparency: 80
                use_new_flow_rate_model: true
                min_flow_rate: 0.75
                max_flow_rate: 6
                max_expected_power: 6900
                min_expected_power: 0.01
                transparency_zero_lines: 0
                sort_individual_devices: false
                disable_dots: false
                allow_layout_break: false
                no_labels: false
                dashboard_link: /energy/now
                dashboard_link_label: Energia Atual
                kilo_threshold: 1000
                base_decimals: 0
                kilo_decimals: 1

              - type: custom:mod-card
                view_layout:
                  column: 2
                style:
                  hui-horizontal-stack-card$: |
                    :host {
                      height: auto;
                    }
                card:
                  type: horizontal-stack
                  cards:
                    - type: custom:button-card
                      size: 30%
                      state:
                        - value: "on"
                          styles:
                            icon:
                              - color: var(--state-active-color)
                      styles:
                        grid:
                          - position: relative
                        icon:
                          - color: var(--state-icon-color)
                        custom_fields:
                          count:
                            - position: absolute
                            - left: 8%
                            - top: 10%
                            - font-size: 18px
                            - font-weight: bold
                            - color: var(--state-icon-color)

                          hall:
                            - position: absolute
                            - left: 8%
                            - top: 38%
                            - color: |
                                [[[
                                  return states['light.bedroom_henrique']?.state === 'on'
                                    ? 'var(--state-active-color)'
                                    : 'var(--state-icon-color)';
                                ]]]

                          main_bathroom:
                            - position: absolute
                            - left: 8%
                            - top: 68%
                            - color: |
                                [[[
                                  return states['light.master_bedroom']?.state === 'on'
                                    ? 'var(--state-active-color)'
                                    : 'var(--state-icon-color)';
                                ]]]

                          ricardo:
                            - position: absolute
                            - right: 8%
                            - top: 8%
                            - color: |
                                [[[
                                  return states['light.bedroom_ricardo']?.state === 'on'
                                    ? 'var(--state-active-color)'
                                    : 'var(--state-icon-color)';
                                ]]]

                          henrique:
                            - position: absolute
                            - right: 8%
                            - top: 38%
                            - color: |
                                [[[
                                  return states['light.bedroom_henrique']?.state === 'on'
                                    ? 'var(--state-active-color)'
                                    : 'var(--state-icon-color)';
                                ]]]

                          master:
                            - position: absolute
                            - right: 8%
                            - top: 68%
                            - color: |
                                [[[
                                  return states['light.master_bedroom']?.state === 'on'
                                    ? 'var(--state-active-color)'
                                    : 'var(--state-icon-color)';
                                ]]]
                      custom_fields:
                        count: |
                          [[[
                            const count = states['binary_sensor.floor_bedrooms_lights_on']?.attributes?.lights_on_count;
                            return count > 0 ? count : '';
                          ]]]
                        hall: |
                          [[[
                            return `<ha-icon icon="mdi:home-roof" style="width: 20px; height: 20px;"></ha-icon>`;
                          ]]]
                        main_bathroom: |
                          [[[
                            return `<ha-icon icon="mdi:shower" style="width: 20px; height: 20px;"></ha-icon>`;
                          ]]]
                        ricardo: |
                          [[[
                            return `<ha-icon icon="mdi:human-child" style="width: 20px; height: 20px;"></ha-icon>`;
                          ]]]
                        henrique: |
                          [[[
                            return `<ha-icon icon="mdi:baby" style="width: 20px; height: 20px;"></ha-icon>`;
                          ]]]
                        master: |
                          [[[
                            return `<ha-icon icon="mdi:bed-king" style="width: 20px; height: 20px;"></ha-icon>`;
                          ]]]
                      show_state: false
                      icon: mdi:home-roof
                      entity: binary_sensor.floor_bedrooms_lights_on
                      name: Quartos
                      tap_action:
                        action: perform-action
                        perform_action: light.turn_off
                        target:
                          floor_id: bedrooms

                    - type: custom:button-card
                      size: 30%
                      state:
                        - value: "on"
                          styles:
                            icon:
                              - color: var(--state-active-color)
                      styles:
                        icon:
                          - color: var(--state-icon-color)
                      show_state: false
                      icon: mdi:grass
                      entity: binary_sensor.area_outside_lights_on
                      name: Exterior
                      tap_action:
                        action: perform-action
                        perform_action: light.turn_off
                        target:
                          area_id: outside

              - type: conditional
                view_layout:
                  column: 2
                conditions:
                  - condition: state
                    entity: cover.gate
                    state_not: closed
                  - condition: state
                    entity: cover.gate
                    state_not: unavailable
                card:
                  type: tile
                  entity: cover.gate
                  vertical: true
                  show_entity_picture: false
                  hide_state: false
                  state_content:
                    - state
                    - last-changed
                  tap_action:
                    action: perform-action
                    perform_action: cover.close_cover
                    target:
                      entity_id: cover.gate
                  icon_tap_action:
                    action: perform-action
                    perform_action: cover.close_cover
                    target:
                      entity_id: cover.gate

              - type: conditional
                view_layout:
                  column: 2
                conditions:
                  - condition: state
                    entity: light.living_room_window
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  show_brightness_control: true
                  layout: horizontal
                  primary_info: name
                  secondary_info: none
                  entity: light.living_room_window
                  name: Luz da Sala
              - type: conditional
                view_layout:
                  column: 2
                conditions:
                  - condition: state
                    entity: light.hall_presence
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  show_brightness_control: true
                  layout: horizontal
                  primary_info: name
                  secondary_info: none
                  entity: light.hall_presence
                  name: Presença Sótão
              - type: conditional
                view_layout:
                  column: 2
                conditions:
                  - condition: state
                    entity: light.hallway_presence
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  show_brightness_control: true
                  layout: horizontal
                  primary_info: name
                  secondary_info: none
                  name: Presença Corredor
                  entity: light.hallway_presence
              - type: conditional
                view_layout:
                  column: 2
                conditions:
                  - condition: state
                    entity: light.stairs_down
                    state: "on"
                card:
                  type: custom:mushroom-light-card
                  show_brightness_control: true
                  layout: horizontal
                  primary_info: name
                  secondary_info: none
                  entity: light.stairs_down
                  name: Hall das Escadas

              - type: custom:auto-entities
                view_layout:
                  column: 2
                card:
                  type: entities
                  title: Rés do Chão
                filter:
                  include:
                    - entity_id: light.*
                      state: "on"
                      options:
                        tap_action:
                          action: perform-action
                          perform_action: light.turn_off
                          target:
                            entity_id: this.entity_id
                        hold_action:
                          action: more-info
                  exclude:
                    - options: {}
                      attributes:
                        supported_features: 40
                    - options: {}
                      floor: bedrooms
                    - options: {}
                      entity_id: light.bedroom_rc_*
                    - options: {}
                      entity_id: light.stairs_down
                    - options: {}
                      entity_id: light.hallway_group
                    - options: {}
                      entity_id: light.*_presence
                    - options: {}
                      entity_id: light.laundry_*
                    - options: {}
                      entity_id: light.office_*
                    - options: {}
                      entity_id: light.hall
                    - options: {}
                      entity_id: light.hall_side
                    - options: {}
                      entity_id: light.living_room_window
                    - options: {}
                      entity_id: light.kitchen_led
                    - options: {}
                      entity_id: light.kitchen_window
                    - options: {}
                      entity_id: light.living_room_group
                    - options: {}
                      entity_id: light.bedroom_*_ceiling
                    - options: {}
                      entity_id: light.bedroom_*_closet
                    - options: {}
                      entity_id: light.bedroom_*_lamp
                    - options: {}
                      entity_id: light.all_*
                    - options: {}
                      entity_id: light.master_bedroom_ceiling
                    - options: {}
                      entity_id: light.master_bedroom_entry
                    - options: {}
                      entity_id: light.master_bedroom_closet
                    - options: {}
                      entity_id: light.master_bedroom_bed*
                    - options: {}
                      entity_id: light.master_bedroom_bathroom_*
                    - options: {}
                      entity_id: light.master_bedroom_bathroom_*
                    - options: {}
                      entity_id: light.stairs_group*
                    - options: {}
                      entity_id: light.bathrom_rc_*
                    - options: {}
                      entity_id: light.bathroom_rc_*
                    - options: {}
                      area: outside
                    - options: {}
                      area: xmas
                sort:
                  method: area
                  numeric: false
                  reverse: false
                show_empty: false

              - type: custom:auto-entities
                view_layout:
                  column: 2
                card:
                  type: entities
                  title: Quartos
                filter:
                  include:
                    - entity_id: light.*
                      floor: bedrooms
                      state: "on"
                      options:
                        tap_action:
                          action: perform-action
                          perform_action: light.turn_off
                          target:
                            entity_id: this.entity_id
                        hold_action:
                          action: more-info
                  exclude:
                    - options: {}
                      attributes:
                        supported_features: 40
                    - options: {}
                      entity_id: light.*_presence
                    - options: {}
                      entity_id: light.hall
                    - options: {}
                      entity_id: light.hall_side
                    - options: {}
                      entity_id: light.bedroom_*_ceiling
                    - options: {}
                      entity_id: light.bedroom_*_closet
                    - options: {}
                      entity_id: light.bedroom_*_lamp
                    - options: {}
                      entity_id: light.all_*
                    - options: {}
                      entity_id: light.master_bedroom_ceiling
                    - options: {}
                      entity_id: light.master_bedroom_entry
                    - options: {}
                      entity_id: light.master_bedroom_closet
                    - options: {}
                      entity_id: light.master_bedroom_bed*
                    - options: {}
                      entity_id: light.master_bedroom_bathroom_*
                    - options: {}
                      entity_id: light.master_bedroom_bathroom_*
                    - options: {}
                      entity_id: light.main_bathroom_*
                    - options: {}
                      entity_id: light.master_bedroom_bathroom_*
                sort:
                  method: area
                  numeric: false
                  reverse: false
                show_empty: false

              - type: custom:auto-entities
                view_layout:
                  column: 2
                card:
                  type: entities
                  title: Exterior
                filter:
                  include:
                    - area: outside
                      state: "on"
                      domain: light
                      options:
                        tap_action:
                          action: perform-action
                          perform_action: light.turn_off
                          target:
                            entity_id: this.entity_id
                        hold_action:
                          action: more-info
                  exclude:
                    - options: {}
                      entity_id: light.storage_*
                    - options: {}
                      entity_id: light.*group
                sort:
                  method: area
                  numeric: false
                  reverse: false
                show_empty: false

