              - type: conditional
                view_layout:
                  column: 1
                conditions:
                  - condition: numeric_state
                    entity: sensor.device_battery_cover_stairs
                    below: 20
                card:
                  type: tile
                  entity: sensor.device_battery_cover_stairs
                  name: Bateria do Motor do Cortinado das Escadas
                  state_content:
                    - state
                    - last_updated
                  vertical: false
                  features:
                    - type: trend-graph
                  features_position: bottom

              - type: custom:mod-card
                view_layout:
                  column: 1
                style:
                  hui-horizontal-stack-card$: |
                    :host {
                      height: auto;
                    }
                card:
                  type: horizontal-stack
                  cards:
                    - type: custom:mini-graph-card
                      name: Temperatura
                      entities:
                        - entity: sensor.average_temperature
                      line_color: "#e74c3c"
                      line_width: 6
                      font_size: 75
                      height: 80
                      align_icon: left
                      align_state: center
                      hours_to_show: 24
                      points_per_hour: 1
                      tap_action:
                        action: navigate
                        navigation_path: /lovelace-subviews/dashboard-climate
                    - type: custom:mini-graph-card
                      name: Humidade
                      entities:
                        - entity: sensor.average_humidity
                      line_width: 6
                      font_size: 75
                      height: 80
                      align_icon: left
                      align_state: center
                      hours_to_show: 24
                      points_per_hour: 1
                      tap_action:
                        action: navigate
                        navigation_path: /lovelace-subviews/dashboard-climate

              - type: conditional
                conditions:
                  - condition: state
                    entity: binary_sensor.rain
                    state: "on"
                card:
                  type: tile
                  entity: binary_sensor.rain
                  name: Chuva Detectada
                  hide_state: true
                  vertical: false
                  features_position: bottom
                view_layout:
                  column: 1


              # - type: custom:mod-card
              #   view_layout:
              #     column: 1
              #   style:
              #     hui-horizontal-stack-card$: |
              #       :host {
              #         height: auto;
              #       }
              #   card:
              #     type: horizontal-stack
