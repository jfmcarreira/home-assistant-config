kiosk_mode:
  hide_header: true
button_card_templates: !include ../common/button-card-templates.yaml
decluttering_templates: !include ../common/declutering.yaml
views:
  - theme: Backend-selected
    title: Dashboard Downstairs
    path: main
    icon: mdi:sofa
    type: custom:horizontal-layout
    layout:
      max_cols: 2
      column_widths: 30% 70%
      max_width: 300px
    badges: []
    cards:
      - type: vertical-stack
        view_layout:
          column: 1
        cards: !include control-panel.yaml
      - type: custom:state-switch
        entity: hash
        default: panel-main
        view_layout:
          column: 2
        states:
          panel-ac:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              margin: 0px 0px 0px 0px
              max_cols: 2
            cards: !include panel-ac.yaml
          panel-covers:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_cols: 2
            cards: !include panel-covers.yaml
          panel-lights:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_cols: 2
            cards: !include panel-lights.yaml

          panel-media:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_cols: 2
              column_widths: 40% 60%
              max_width: 2000px
            cards: !include panel-media.yaml

          panel-roborock:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_cols: 2
            cards: !include panel-roborock.yaml

          panel-water-heater:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_cols: 2
            cards: !include panel-water-heater.yaml

          panel-routines:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_width: 2000px
              column_widths: 100%
              max_cols: 1
            cards: !include panel-routines.yaml

          panel-exterior:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              max_width: 2000px
              column_widths: 100%
              max_cols: 1
            cards: !include panel-exterior.yaml
          panel-main:
            type: custom:layout-card
            layout_type: custom:horizontal-layout
            layout:
              margin: -7px 0px 0px 0px
              max_cols: 2
              #height: 700px
            cards:
              - type: custom:layout-card
                view_layout:
                  column: 1
                layout_type: custom:horizontal-layout
                layout:
                  margin: -7px 0px 0px 0px
                  max_cols: 1
                cards: !include panel-main-left.yaml
              - type: custom:layout-card
                view_layout:
                  column: 2
                layout_type: custom:horizontal-layout
                layout:
                  margin: -7px 0px 0px 0px
                  max_cols: 1
                  height: 695px
                cards: !include panel-main-right.yaml

