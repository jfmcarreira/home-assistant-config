- type: entity-filter
  show_empty: false
  card:
    type: entities
    title: Rés do Chão
  entities:
    - entity: light.kitchen
      secondary_info: last-changed
    - entity: light.laundry
      secondary_info: last-changed
    - entity: light.office
      secondary_info: last-changed
    - entity: light.bedroom_rc
      secondary_info: last-changed
    - entity: light.bathroom_rc
      secondary_info: last-changed
  state_filter:
    - "on"

- type: entity-filter
  show_empty: false
  entities:
    - entity: light.hall
      secondary_info: last-changed
    - entity: light.main_bathroom
      secondary_info: last-changed
    - entity: light.master_bedroom
      secondary_info: last-changed
    - entity: light.master_bedroom_bathroom
      secondary_info: last-changed
    - entity: light.bedroom_ricardo
      secondary_info: last-changed
    - entity: light.bedroom_henrique
      secondary_info: last-changed
    - entity: light.stairs_wall
      secondary_info: last-changed
    - entity: light.stairs_lamp
      secondary_info: last-changed
  state_filter:
    - "on"
  card:
    type: entities
    title: Quartos
    options:
      tap_action:
        action: perform-action
        perform_action: light.turn_off
        target:
          entity_id: this.entity_id
      hold_action:
        action: more-info


- type: custom:auto-entities
  view_layout:
    column: 2
  card:
    type: entities
    title: Exterior
  filter:
    include:
      - area: outside
        state: "on"
        domain: light
        options:
          tap_action:
            action: perform-action
            perform_action: light.turn_off
            target:
              entity_id: this.entity_id
          hold_action:
            action: more-info
    exclude:
      - options: {}
        entity_id: light.storage_*
      - options: {}
        entity_id: light.*group
  sort:
    method: area
    numeric: false
    reverse: false
  show_empty: false

