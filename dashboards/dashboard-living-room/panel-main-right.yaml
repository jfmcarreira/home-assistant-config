#     column: 2
#   conditions:
#     - entity: climate.portable_heater
#       state_not: "off"
#   card:
#     type: tile
#     entity: climate.portable_heater
- type: conditional
  view_layout:
    column: 2
  conditions:
    - entity: humidifier.portable_dehumidifier
      state_not: "off"
  card:
    type: tile
    entity: humidifier.portable_dehumidifier
    features:
      - type: target-humidity
    features_position: inline
- type: conditional
  view_layout:
    column: 2
  conditions:
    - entity: binary_sensor.roborock_state
      state: "on"
  card:
    type: tile
    entity: vacuum.roborock
    features:
      - type: vacuum-commands
        commands:
          - start_pause
          - stop
          - clean_spot
- type: entity-filter
  view_layout:
    column: 2
  entities:
    - entity: fan.main_bathroom
      name: Principal
    - entity: fan.bathroom_master_bedroom
      name: Suite
    - entity: fan.bathroom_rc
      name: Serviço
  state_filter:
    - "on"
  card:
    type: entities
    title: Ventoinhas da Casa do Banho
    show_header_toggle: true
  show_empty: false

- type: logbook
  view_layout:
    column: 2
  title: Atividade
  hours_to_show: 1
  target:
    entity_id:
      - binary_sensor.motion_sensor_office
    area_id: outside
    label_id:
      - movimento
      - seguranca
