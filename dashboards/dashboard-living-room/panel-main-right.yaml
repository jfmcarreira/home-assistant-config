- type: custom:auto-entities
  view_layout:
    column: 2
  card:
    type: entities
    title: Exterior
  filter:
    include:
      - area: outside
        state: "on"
        domain: light
        options:
          tap_action:
            action: perform-action
            perform_action: light.turn_off
            target:
              entity_id: this.entity_id
          hold_action:
            action: more-info
    exclude:
      - options: {}
        entity_id: light.storage_*
      - options: {}
        entity_id: light.*group
  sort:
    method: area
    numeric: false
    reverse: false
  show_empty: false

