- type: conditional
  view_layout:
    column: 2
  conditions:
    - condition: state
      entity: cover.gate
      state_not: closed
    - condition: state
      entity: cover.gate
      state_not: unavailable
  card:
    type: tile
    entity: cover.gate
    vertical: true
    show_entity_picture: false
    hide_state: false
    state_content:
      - state
      - last-changed
    tap_action:
      action: perform-action
      perform_action: cover.close_cover
      target:
        entity_id: cover.gate
    icon_tap_action:
      action: perform-action
      perform_action: cover.close_cover
      target:
        entity_id: cover.gate

- type: conditional
  view_layout:
    column: 2
  conditions:
    - condition: state
      entity: light.living_room_window
      state: "on"
  card:
    type: custom:bubble-card
    card_type: button
    button_type: slider
    sub_button:
      main: []
      bottom: []
    entity: light.living_room_window
    name: Luz da Sala
    show_name: true
    use_accent_color: false
    show_icon: true
    scrolling_effect: true
    show_state: false
    show_last_changed: false
    show_last_updated: false
    show_attribute: false
    modules: []

