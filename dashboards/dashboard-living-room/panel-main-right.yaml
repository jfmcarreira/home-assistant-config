#   view_layout:
#     column: 2
#   conditions:
#     - entity: climate.portable_heater
#       state_not: "off"
#   card:
#     type: tile
#     entity: climate.portable_heater
- type: conditional
  view_layout:
    column: 2
  conditions:
    - entity: humidifier.portable_dehumidifier
      state_not: "off"
  card:
    type: tile
    entity: humidifier.portable_dehumidifier
    features:
      - type: target-humidity
    features_position: inline
- type: conditional
  view_layout:
    column: 2
  conditions:
    - entity: binary_sensor.roborock_state
      state: "on"
  card:
    type: tile
    entity: vacuum.roborock
    features:
      - type: vacuum-commands
        commands:
          - start_pause
          - stop
          - clean_spot
- type: entity-filter
  view_layout:
    column: 2
  entities:
    - entity: fan.main_bathroom
      name: Principal
    - entity: fan.bathroom_master_bedroom
      name: Suite
    - entity: fan.bathroom_rc
      name: Serviço
  state_filter:
    - "on"
  card:
    type: entities
    title: Ventoinhas da Casa do Banho
    show_header_toggle: true
  show_empty: false

- type: custom:auto-entities
  card:
    type: entities
    title: Deteções da Rua
  filter:
    include:
      - entity_id: binary_sensor.*_person
        state: "on"
        area: outside
      - entity_id: binary_sensor.*_car
        state: "on"
        area: outside
    exclude:
      - entity_id: binary_sensor.driveway_camera_car
  sort:
    method: area
    numeric: false
    reverse: false
  show_empty: false

- type: logbook
  title: Atividade da Rua
  hours_to_show: 0.25
  state_filter:
    - "on"
  target:
    entity_id:
      - binary_sensor.front_camera_person
      - binary_sensor.backyard_camera_person
      - binary_sensor.driveway_camera_person
      - binary_sensor.frigate_zone_front_garden_person
      - binary_sensor.frigate_zone_front_gate_person
      - binary_sensor.frigate_zone_front_gate_car
      - binary_sensor.frigate_zone_driveway_gate_person
      - binary_sensor.frigate_zone_driveway_gate_car
      - binary_sensor.frigate_zone_kitchen_door_person
