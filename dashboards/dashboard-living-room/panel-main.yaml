- type: conditional
  conditions:
    - condition: state
      entity: sensor.weather_alert
      state_not: green
    - condition: state
      entity: sensor.weather_alert
      state_not: yellow
  card:
    type: custom:button-card
    name: "[[[ return helpers.localize(states['sensor.weather_alert']); ]]]"
    label: Alerta Metereológico
    show_label: true1
    tap_action:
      action: none
    styles:
      card:
        - height: 80px
        - display: flex
        - flex-direction: column
        - justify-content: center
        - align-items: center
      name:
        - font-size: 40px
        - font-weight: 500
        - line-height: 1.2
        - margin: "-13px"
        - padding: 5px
      label:
        - font-size: 20px
        - font-weight: 400
        - color: gray
        - margin: 8px
        - padding: "-10px"
        - line-height: 1.2
    visibility:
      - condition: state
        entity: sensor.weather_alert
        state_not: green
      - condition: state
        entity: sensor.weather_alert
        state_not: yellow
  view_layout:
    column: 1

- type: conditional
  conditions:
    - condition: state
      entity: binary_sensor.rain
      state: "on"
  card:
    type: tile
    entity: binary_sensor.rain
    name: Chuva Detectada
    hide_state: true
    vertical: false
    features_position: bottom
  view_layout:
    column: 1

- type: conditional
  conditions:
    - entity: sensor.salicru_rack_ups_status
      state: On Battery
  card:
    type: gauge
    entity: sensor.salicru_rack_ups_battery_charge
    name: Bateria da UPS
    unit: "%"
    min: 0
    max: 100
    needle: false
    severity:
      green: 60
      yellow: 20
      red: 2
  view_layout:
    column: 1

- type: conditional
  conditions:
    - entity: input_boolean.house_guest
      state: "on"
  card:
    type: tile
    entity: input_boolean.house_guest
    name: Modo de Convidados
    tap_action:
      action: call-service
      service: input_boolean.turn_off
      data: {}
      target:
        entity_id: input_boolean.house_guest
    icon_tap_action:
      action: none
  view_layout:
    column: 1

- type: conditional
  conditions:
    - entity: input_boolean.extended_away_mode
      state: "on"
  card:
    type: tile
    entity: input_boolean.extended_away_mode
    name: Modo de Férias
    tap_action:
      action: call-service
      service: input_boolean.turn_off
      data: {}
      target:
        entity_id: input_boolean.extended_away_mode
    icon_tap_action:
      action: none
  view_layout:
    column: 1

- type: custom:auto-entities
  card:
    type: vertical-stack
  card_param: cards
  filter:
    exclude:
      - options: {}
        entity_id: script.routine_dinner_time
      - options: {}
        entity_id: script.routine_cover_rain_mode
    include:
      - options:
          type: tile
          features_position: bottom
          vertical: false
          tap_action:
            action: toggle
          icon_tap_action:
            action: more-info
          hide_state: true
        entity_id: script.routine*
        state: "on"
  show_empty: false
  view_layout:
    column: 1

