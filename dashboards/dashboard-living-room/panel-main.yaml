- type: conditional
  conditions:
    - condition: state
      entity: alarm_control_panel.alarmo
      state_not: disarmed
  card:
    states:
      - arm_home
      - arm_away
    type: alarm-panel
    entity: alarm_control_panel.alarmo
  view_layout:
    column: 1

- type: conditional
  view_layout:
    column: 1
  conditions:
    - condition: numeric_state
      entity: sensor.temperature_water_heater_top
      below: 50
  card:
    type: tile
    entity: climate.water_heater
    vertical: false
    icon_tap_action:
      action: toggle
    features:
      - type: target-temperature
      - style: icons
        type: climate-preset-modes
        preset_modes:
          - none
          - comfort
          - eco
    features_position: bottom

- type: conditional
  view_layout:
    column: 1
  conditions:
    - condition: state
      entity: climate.living_room
      state_not: unavailable
    - condition: or
      conditions:
        - condition: state
          entity: climate.living_room
          state_not: "off"
        - condition: numeric_state
          entity: sensor.temperature_living_room
          above: 25
        - condition: numeric_state
          entity: sensor.temperature_living_room
          below: 18
  card:
    type: tile
    entity: climate.living_room
    state_content:
      - current_temperature
      - fan_mode
      - swing_mode
      - preset_mode
    vertical: false
    features:
      - style: icons
        type: climate-hvac-modes
        hvac_modes:
          - heat
          - cool
          - dry
          - fan_only
          - "off"
      - style: icons
        type: climate-fan-modes
      - type: target-temperature
    features_position: bottom

- type: conditional
  view_layout:
    column: 1
  conditions:
    - condition: numeric_state
      entity: sensor.device_battery_cover_stairs
      below: 20
  card:
    type: tile
    entity: sensor.device_battery_cover_stairs
    name: Bateria do Motor do Cortinado das Escadas
    state_content:
      - state
      - last_updated
    vertical: false
    features:
      - type: trend-graph
    features_position: bottom

- type: custom:mod-card
  view_layout:
    column: 1
  style:
    hui-horizontal-stack-card$: |
      :host {
        height: auto;
      }
  card:
    type: horizontal-stack
    cards:
      - type: custom:mini-graph-card
        name: Temperatura
        entities:
          - entity: sensor.average_temperature
        line_color: "#e74c3c"
        line_width: 6
        font_size: 75
        height: 80
        align_icon: left
        align_state: center
        hours_to_show: 24
        points_per_hour: 1
        tap_action:
          action: navigate
          navigation_path: /lovelace-subviews/dashboard-climate
      - type: custom:mini-graph-card
        name: Humidade
        entities:
          - entity: sensor.average_humidity
        line_width: 6
        font_size: 75
        height: 80
        align_icon: left
        align_state: center
        hours_to_show: 24
        points_per_hour: 1
        tap_action:
          action: navigate
          navigation_path: /lovelace-subviews/dashboard-climate

