        limit: 25
        favorites_only: true
    columns: 3
    recents:
      enabled: true
      album:
        limit: 10
      audiobooks:
        enabled: false
  queue:
    enabled: true
    limit_before: 10
    limit_after: 20
    show_album_covers: true
    show_artist_names: true
  players:
    hide:
