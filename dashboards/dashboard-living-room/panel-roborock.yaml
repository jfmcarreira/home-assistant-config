- type: custom:mod-card
  view_layout:
    column: 1
  style:
    hui-horizontal-stack-card$: |
      :host {
        height: auto;
      }
  card:
    type: horizontal-stack
    cards:
    - show_name: true
      show_icon: true
      icon_height: 50px
      type: button
      tap_action:
        action: toggle
      entity: input_boolean.vacuum_hall
    - show_name: true
      show_icon: true
      icon_height: 50px
      type: button
      tap_action:
        action: toggle
      entity: input_boolean.vacuum_mainbathroom
