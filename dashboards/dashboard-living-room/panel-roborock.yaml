- show_name: true
  show_icon: true
  type: button
  tap_action:
    action: perform-action
    perform_action: script.roborock_vacuum_selected_rooms
    target: {}
  icon: mdi:vacuum
  show_state: true
  icon_height: 60px
  view_layout:
    column: 1
- type: custom:valetudo-map-card
  view_layout:
    column: 2
  vacuum: roborock
  title: Roborock
  map_scale: 1.4
  crop:
    top: 80
    bottom: 40
    left: 0
    right: 40
