- type: custom:mod-card
  view_layout:
    column: 1
  style:
    hui-horizontal-stack-card$: |
      :host {
        height: auto;
      }
  card:
    type: horizontal-stack
    cards:
    - type: entity
      entity: sensor.temperature_water_heater_top
      name: Saída
    - type: entity
      entity: sensor.temperature_water_heater_bottom
      name: Entrada
    - type: entity
      entity: sensor.temperature_solar_panel
      name: Painel


- type: tile
  view_layout:
    column: 1
  features:
      - type: climate-hvac-modes
        hvac_modes:
          - heat
          - "off"
      - type: target-temperature
      - type: climate-preset-modes
        style: dropdown
  entity: climate.water_heater
  state_content:
    - current_temperature
    - last-changed


- type: custom:mod-card
  view_layout:
    column: 1
  style:
    hui-horizontal-stack-card$: |
      :host {
        height: auto;
      }
  card:
    type: horizontal-stack
    cards:
    - type: tile
      features_position: bottom
      vertical: false
      entity: switch.water_heater_comfort_mode
      name: Modo Conforto
    - type: tile
      entity: switch.water_heater
      features_position: bottom
      vertical: false
      view_layout:
        position: sidebar
  columns: 2

- type: statistics-graph
  chart_type: line
  period: 5minute
  days_to_show: 4
  entities:
    - entity: sensor.temperature_water_heater_bottom
      name: Entrada
    - entity: sensor.temperature_water_heater_top
      name: Saída
    - entity: sensor.temperature_solar_panel
      name: Painel Solar
  stat_types:
    - mean
  logarithmic_scale: false


- type: custom:mod-card
  style:
    hui-horizontal-stack-card$: |
      :host {
        height: auto;
      }
  card:
    type: horizontal-stack
    cards:
    - type: tile
      entity: binary_sensor.water_heater_pump_state
      tap_action:
        action: more-info
      icon_tap_action:
        action: more-info
      name: Bomba
    - type: tile
      entity: binary_sensor.water_heater_panel_heating
      name: "Aquec. Painéis "
  columns: 2


- type: entities
  title: Sensores
  entities:
    - entity: sensor.device_power_water_heater
    - entity: sensor.device_power_solar_water_heater_pump
