substitutions:
  devicename: nodemcu-water-kitchen

esphome:
  friendly_name: NodeMCU da Cozinha

esp8266:
  board: nodemcuv2
  early_pin_init: false

packages:
  esphome_base: !include packages/common.yml
  esphome_web: !include packages/webserver.yml

sensor:
  # Ref https://github.com/smarthomeshop/waterflowkit/blob/main/waterflowkit-v2/base.yaml
  # Calibration
  # ZJ-B5: approximately 396 pulses per litre
  # 0.002525; # 1/396
  - platform: pulse_counter
    pin:
      number: D2
      mode:
        input: true
        pullup: true
    unit_of_measurement: "L/min"
    device_class: volume_flow_rate
    id: water_usage_1
    name: "Water Flow Dish-washing Machine"
    state_class: measurement
    icon: "mdi:water-pump"
    update_interval: 1s
    count_mode:
      rising_edge: INCREMENT
      falling_edge: DISABLE
    accuracy_decimals: 2
    filters:
      - multiply: 0.002525
    total:
      id: sensor_pulse_meter_total
      name: "Water Meter Dish-washing Machine"
      unit_of_measurement: "L"
      state_class: total_increasing
      device_class: water
      icon: mdi:gauge
      accuracy_decimals: 3
      filters:
        - multiply: 0.002525

  - platform: pulse_counter
    id: water_usage_2
    pin:
      number: D4
      mode:
        input: true
        pullup: true

  - platform: pulse_counter
    id: water_usage_3
    pin:
      number: D6
      mode:
        input: true
        pullup: true
