substitutions:
  devicename: nodemcu_gate

esphome:
  friendly_name: NodeMCU do Portão

esp8266:
  board: nodemcuv2
  early_pin_init: false

packages:
  esphome_base: !include packages/common.yml
  esphome_web: !include packages/webserver.yml

external_components:
  - source:
      type: local
      path: components/
    components: [sc_cover]

output:
  - platform: gpio
    id: relay_1
    pin:
      number: D1

  - platform: gpio
    id: relay_2
    pin:
      number: D2

sensor:
  - platform: homeassistant
    id: main_power
    entity_id: sensor.device_power_gate

binary_sensor:
  - platform: gpio
    id: gate_close_sensor
    name: gate_close
    pin:
      inverted: true
      number: D6
      mode: INPUT_PULLUP
    filters:
      - delayed_on: 250ms

  - platform: gpio
    id: gate_open_sensor
    name: gate_open
    pin:
      number: D5
      inverted: true
      mode: INPUT_PULLUP
    filters:
      - delayed_on: 250ms

button:
  - platform: template
    id: gate_open_single_ha
    name: Gate Open Single (HA)
    on_press:
      then:
        - lambda: "id(gate)->trigger_half_open();"

  - platform: output
    id: gate_open_single
    name: Gate Open Single (Relay)
    output: relay_2
    duration: 750ms

  - platform: output
    id: gate_open
    name: Gate Open (Relay)
    output: relay_1
    duration: 750ms

cover:
  - platform: sc_cover
    name: "Gate"
    id: gate
    device_class: gate
    door_activate_button: gate_open
    half_activate_button: gate_open_single
    button_press_interval: 1500ms
    open_endstop: gate_open_sensor
    close_endstop: gate_close_sensor
    open_duration: 17s
    close_duration: 20s
    setup_delay: 2s


logger:
  level: DEBUG