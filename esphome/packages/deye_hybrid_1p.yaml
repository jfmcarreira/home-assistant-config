substitutions:
  func_int_to_time: |-
    uint8_t hours = raw / 100;
    uint8_t minutes = raw - (hours * 100);
    return ESPTime {.minute = minutes, .hour = hours};
  func_time_to_int: "return x.hour * 100 + x.minute;"


globals:
  - id: last_total_energy_bought
    type: float
    restore_value: yes
  - id: last_update_time
    type: unsigned long
    restore_value: yes

