## Based on https://github.com/patrickcollins12/esphome-fan-controller

esphome:
  devices:
    - id: device_deye_cooling_fan
      name: Deye Inverter Cooling Fan

output:
  - platform: ledc
    pin: GPIO04
    id: console_fan_speed
    # 25KHz is standard PC fan frequency, minimises buzzing
    frequency: "25000 Hz"

    # my fans stop working below 13% powerful.
    # also they're  powerful and loud, cap their max speed to 80%
    min_power: 10%
    max_power: 100%

    # At 0, actually turn it off, otherwise the power keeps going.
    zero_means_zero: true

  - platform: template
    id: proxy_cool_output
    type: float
    write_action:
      lambda: |-
        auto write_val = (id(manual_fan_control).state) ? id(manual_fan_control).speed / 100.0 : state * 1.0;
        if(id(house_mode_night).state){
            write_val = min(write_val, 0.35);
        }
        if(id(notify_home).state){
            write_val = min(write_val, 0.75);
        }
        id(console_fan_speed).set_level(write_val);
        id(fan_speed_pwm_voltage).publish_state(write_val*100.0);

  # - platform: template
  #   id: proxy_heat_output
  #   type: float
  #   write_action:
  #     lambda: |-
  #       if(state > 0.0) {
  #         id(console_fan_speed).set_level(0.0);
  #         id(fan_speed_pwm_voltage).publish_state(0.0);
  #       }

fan:
  - platform: speed
    device_id: device_deye_cooling_fan
    id: manual_fan_control
    output: proxy_cool_output
    name: "Deye Inverter Cooling Fan Manual Speed"

sensor:
  - platform: template
    device_id: device_deye_cooling_fan
    name: "Temperature"
    unit_of_measurement: "ºC"
    id: current_temperature
    lambda: |-
      //return (id(deye_temperature_dc).state + id(deye_temperature_ac).state)/2;
      return max(id(deye_temperature_dc).state, id(deye_temperature_ac).state);

  # Every time the fan speed is updated, this sensor will
  # also be updated for displaying on the frontend.
  # See proxy_cool_output.
  - platform: template
    device_id: device_deye_cooling_fan
    name: "Speed (PWM)"
    unit_of_measurement: "%"
    id: fan_speed_pwm_voltage

# Expose a PID-controlled Thermostat
# Manual: https://esphome.io/components/climate/pid.html
climate:
  - platform: pid
    device_id: device_deye_cooling_fan
    name: "Deye Inverter Cooling Fan"
    id: fan_thermostat
    sensor: current_temperature

    default_target_temperature: 45°C
    cool_output: proxy_cool_output
    #heat_output: proxy_heat_output

    # ON state change, publish the values to the x_term numbers defined
    # above, so that they can be viewed in HA
    # on_state:
    #   - sensor.template.publish:
    #       id: p_term
    #       state: !lambda 'return -id(fan_thermostat).get_proportional_term() * 100.0;'
    #   - sensor.template.publish:
    #       id: i_term
    #       state: !lambda 'return -id(fan_thermostat).get_integral_term()* 100.0;'
    #   - sensor.template.publish:
    #       id: d_term
    #       state: !lambda 'return -id(fan_thermostat).get_derivative_term()* 100.0;'
    #   - sensor.template.publish:
    #       id: o_term
    #       state: !lambda 'return -id(fan_thermostat).get_output_value()* 100.0;'
    #   - sensor.template.publish:
    #       id: in_deadband_term
    #       state: !lambda 'return id(fan_thermostat).in_deadband();'
    #   - sensor.template.publish:
    #       id: e_term
    #       state: !lambda 'return -id(fan_thermostat).get_error_value();'

    # The extents of the HA Thermostat
    visual:
      min_temperature: 30 °C
      max_temperature: 60 °C
      temperature_step:
        target_temperature: 1.0
        current_temperature: 0.1

    # See the README for setting up these parameters.
    # These are over ridden by the number templates above.
    control_parameters:
      # kp: 0.80415
      # ki: 0.00305
      # kd: 53.07421
      kp: 0.2
      ki: 0.001
      kd: 40
      max_integral: 0.0
      output_averaging_samples: 1
      derivative_averaging_samples: 5

    # How to behave when close to the target temperature?
    deadband_parameters:
      threshold_high: 1.0°C
      threshold_low: -0.2°C
      kp_multiplier: 0.0
      ki_multiplier: 0.0
      kd_multiplier: 0.0
      deadband_output_averaging_samples: 15


