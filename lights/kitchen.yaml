unique_id: lights_kitchen_group
name: Luzes da Cozinha
state: >-
  {{
      is_state('light.kitchen_led', 'on') or
      is_state('light.kitchen_window', 'on') or
      is_state('light.kitchen_pantry', 'on')
  }}
turn_on:
  - action: light.turn_on
    target:
      entity_id: light.kitchen_led
turn_off:
  - action: light.turn_off
    target:
      area_id: kitchen

effect_list: >-
  {% set list = [] %}
  {% set list = list + ['Todas'] %}
  {% set list = list + ['Algumas'] %}
  {{ list }}
set_effect:
  - action: light.turn_on
    target:
      entity_id: light.kitchen_led
effect: >-
  {% if is_state('light.kitchen_led', 'on') and is_state('light.kitchen_window', 'on') %}
    {{ "Todas" }}
  {% else %}
    {{ "Algumas" }}
  {% endif %}