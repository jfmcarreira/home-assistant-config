unique_id: lights_laundry_group
name: Luz da Lavandaria
state: >-
  {{
      is_state('light.laundry_main', 'on') or
      is_state('light.laundry_extra', 'on')
  }}
turn_on:
  - choose:
      - conditions: "{{ is_state('binary_sensor.night_mode', 'on') }}"
        sequence:
          - service: light.turn_on
            entity_id: light.laundry_main
    default:
      - service: light.turn_on
        entity_id: light.laundry_main
      - service: light.turn_on
        entity_id: light.laundry_extra
turn_off:
  - service: light.turn_off
    target:
      area_id: laundry

effect_list: >-
  {% set list = [] %}
  {% set list = list + ['Todas'] %}
  {% set list = list + ['Algumas'] %}
  {{ list }}
set_effect:
  - choose:
      - conditions: "{{ effect == 'Algumas' and is_state('binary_sensor.night_mode', 'on') }}"
        sequence:
          - service: light.turn_on
            entity_id: light.laundry_extra
    default:
      - service: light.turn_on
        entity_id: light.laundry_main
      - service: light.turn_on
        entity_id: light.laundry_extra
effect: >-
  {% if is_state('light.laundry_extra', 'on') and is_state('light.laundry_main', 'on') %}
    {{ "Todas" }}
  {% else %}
    {{ "Algumas" }}
  {% endif %}