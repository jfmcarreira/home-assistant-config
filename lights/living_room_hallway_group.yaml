unique_id: lights_living_room_hallway_group
name: Luzes da Sala/Corredor
state: >-
  {{
      is_state('light.lights_living_room_group', 'on') or
      is_state('light.doorway', 'on') or
      is_state('light.hallway', 'on') or
      is_state('light.hallway_presence', 'on')
  }}
turn_on:
  - choose:
      - conditions: "{{ is_state('binary_sensor.night_mode', 'on') }}"
        sequence:
          - service: light.turn_on
            entity_id: light.living_room_window
    default:
      - service: light.turn_on
        entity_id: light.living_room
      - service: light.turn_on
        entity_id: light.hallway
      - service: light.turn_on
        entity_id: light.doorway
turn_off:
  - service: light.turn_off
    entity_id: light.living_room_group
  - service: light.turn_off
    entity_id: light.doorway
  - service: light.turn_off
    entity_id: light.hallway
  - service: light.turn_off
    entity_id: light.hallway_presence
