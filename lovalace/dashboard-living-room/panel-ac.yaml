
- type: tile
  entity: climate.living_room
  name: Sala
  vertical: false
  features_position: bottom
  state_content:
    - current_temperature
    - fan_mode
    - swing_mode
    - preset_mode
  features:
    - style: icons
      type: climate-hvac-modes
      hvac_modes:
        - heat
        - cool
        - dry
        - fan_only
        - 'off'
    - style: icons
      type: climate-fan-modes
    - type: target-temperature
