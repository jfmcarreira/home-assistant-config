- type: grid
  view_layout:
    column: 1
  square: false
  columns: 2
  cards:
    - type: custom:button-card
      name: Entrada
      show_icon: false
      styles:
        card:
          - height: 70px
        custom_fields:
          icon_button:
            - position: absolute
            - left: 8px
            - top: 16.5
            - width: 30px
            - height: 30px
            - border-radius: 50%
            - background: rgba(255, 255, 255, 0.1)
        name:
          - position: absolute
          - font-weight: 500
          - font-size: 15px
          - left: 55px
      custom_fields:
        icon_button:
          card:
            type: custom:button-card
            entity: light.doorway
            show_name: false
            state:
              - operator: default
                color: var(--disabled-text-color)
              - operator: '=='
                value: 'on'
                color: var(--state-active-color)
            styles:
              card:
                - width: 30px
                - height: 30px
                - border-radius: 50%
              icon:
                - width: 20px
            tap_action:
              action: call-service
              service: light.toggle
              target:
                entity_id: light.doorway
      tap_action:
        action: call-service
        service: light.toggle
        target:
          entity_id: light.doorway
    - type: custom:button-card
      name: Corredor
      show_icon: false
      styles:
        card:
          - height: 70px
        custom_fields:
          icon_button:
            - position: absolute
            - left: 8px
            - top: 16.5
            - width: 30px
            - height: 30px
            - border-radius: 50%
            - background: rgba(255, 255, 255, 0.1)
        name:
          - position: absolute
          - font-weight: 500
          - font-size: 15px
          - left: 55px
      custom_fields:
        icon_button:
          card:
            type: custom:button-card
            entity: light.hallway
            show_name: false
            state:
              - operator: default
                color: var(--disabled-text-color)
              - operator: '=='
                value: 'on'
                color: var(--state-active-color)
            styles:
              card:
                - width: 30px
                - height: 30px
                - border-radius: 50%
              icon:
                - width: 20px
            tap_action:
              action: call-service
              service: light.toggle
              target:
                entity_id: light.hallway
      tap_action:
        action: call-service
        service: light.toggle
        target:
          entity_id: light.hallway

