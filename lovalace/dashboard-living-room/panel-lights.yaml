- type: custom:button-card
  view_layout:
    column: 1
  template:
    - template-room-light
    - template-room-light-popup
    - template-room-light-automatic
  name: Cozinha
  variables:
    room_light: light.kitchen
    lights_popup_title: Luzes da Cozinha
    lights_popup_room: kitchen
    lights_popup_pattern: light.kitchen_*
    automation: automation.lights_motion_kitchen
  triggers_update:
    - automation.lights_motion_kitchen
