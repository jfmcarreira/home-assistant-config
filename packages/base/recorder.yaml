################################################################################
## Recorder
################################################################################
recorder:
  db_url: !secret db_url
  purge_keep_days: 10
  commit_interval: 30
  exclude:
    event_types:
      - zha_event
      - service_removed
      - service_executed
      - platform_discovered
      - homeassistant_start
      - feedreader
      - service_registered
      - component_loaded
      - logbook_entry
      - system_log_event
    domains:
      - updater
      - weblink
      - zone
      - timer
      - remote
      - camera
      - update
    entity_globs:
      - update.*
      - sensor.birthday_*
      - sensor.daily_*
      - sensor.*daily*
      - sensor.*average
      - sensor.query_*
      - sensor.wifi_*
      - sensor.*_wifi_signal
      - sensor.ble_scanner_*
      - sensor.*distance*
      - sensor._*last_done*
      - sensor._*last_clean*
      - binary_sensor.*_group
      - select.*
    entities:
      # Helpers
      - binary_sensor.workday
      - binary_sensor.workday_tomorrow
      - automation.event_remain_task_todo
      # Sensor Groups
      - binary_sensor.motion_sensor_stairs_hallway
      - binary_sensor.motion_sensor_stairs
      # Unecessary Sensors
      - sensor.grocy_stock