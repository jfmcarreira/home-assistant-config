template:
  - binary_sensor:
      - name: battery_full
        unique_id: battery_full
        icon: mdi:tumble-dryer
        device_class: plug
        availability: >-
          {{ is_number(states('sensor.deye_inverter_battery')) }}
        state: >-
          {% if is_state( 'binary_sensor.battery_full', 'on' )  %}
              {%- if states("sensor.deye_inverter_battery") | float(0) < 95.0 %}
                  False
              {%- else %}
                  True
              {%- endif %}
          {%- else %}
              {%- if states("sensor.deye_inverter_battery") | float(0) > 98.0 %}
                  True
              {%- else %}
                  False
              {%- endif %}
          {%- endif %}

  - sensor:
      - name: battery_time_left_to_charge
        unique_id: battery_time_left_to_charge
        state: >-
          {% if states('sensor.deye_inverter_battery_power') | float < 0 %}
            {% set current_charge_level_kwh = (11800.0  * (states('sensor.deye_inverter_battery') | float) / 100.0) %}
            {% set left_to_charge_kwh = ((11800.0 - current_charge_level_kwh)  | float) | round(2) %}
            {% set charging_time_seconds = left_to_charge_kwh / (states('sensor.deye_inverter_battery_power') | float) * -3600.0 %}

            {% set future = (now() + timedelta(seconds=charging_time_seconds)) | as_datetime %}
              {% set diff = future - now() %}
              {% set days = diff.days %}
              {% set hours = (diff.seconds // 3600) %}
              {% set minutes = (diff.seconds % 3600) // 60 %}
              {{ days }}d {{ hours }}h {{ minutes }}m
            {% else %}
              Not Charging
            {% endif %}

      - name: battery_time_left_to_discharge
        unique_id: battery_time_left_to_discharge
        state: >-
          {% if states('sensor.deye_inverter_battery_power') | float > 0 %}
            {% set current_charge_level_kwh = (11800  * (states('sensor.deye_inverter_battery') | float) / 100.0) %}
            {% set discharging_time_seconds = (current_charge_level_kwh / (states('sensor.deye_inverter_battery_power') | float) ) * 3600 %}

            {% set future = (now() + timedelta(seconds=discharging_time_seconds)) | as_datetime %}
              {% set diff = future - now() %}
              {% set days = diff.days %}
              {% set hours = (diff.seconds // 3600) %}
              {% set minutes = (diff.seconds % 3600) // 60 %}
              {{ days }}d {{ hours }}h {{ minutes }}m
            {% else %}
              Charging
            {% endif %}

