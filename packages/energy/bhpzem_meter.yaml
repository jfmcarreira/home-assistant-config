template:
  - sensor:
    - name: bhpzem_meter
      unique_id: bhpzem_meter
      device_class: energy
      unit_of_measurement: "kWh"
      state_class: total_increasing
      state: "{{ states('sensor.house_energy_grid') | int(0) }}"
      availability: "{{ not is_state('sensor.house_energy_grid', 'unavailable')  }}"
