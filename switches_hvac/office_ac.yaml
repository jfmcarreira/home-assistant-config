name: Ar Condicionado do Escritório
unique_id: office_ac
icon: mdi:air-conditioner
state: >-
  {{
    not is_state('climate.office', 'off') and
    not is_state('climate.office', 'unavailable')
  }}
turn_on:
  - if:
      - condition: state
        entity_id: binary_sensor.hot_months
        state: "on"
    then:
          - action: climate.set_hvac_mode
            metadata: {}
            data:
              hvac_mode: cool
            target:
              entity_id: climate.office
    else:
          - action: climate.set_hvac_mode
            metadata: {}
            data:
              hvac_mode: heat
            target:
              entity_id: climate.office

  - action: climate.set_fan_mode
    data:
      fan_mode: auto
    target:
      entity_id: climate.office
  # - action: climate.set_swing_mode
  #   data:
  #     swing_mode: swing
  #   target:
  #     entity_id: climate.office
turn_off:
  - condition: not
    conditions:
      - condition: state
        entity_id: climate.office
        state: "off"
  - service: climate.turn_off
    target:
      entity_id:
        - climate.office
